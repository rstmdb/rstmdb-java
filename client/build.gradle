plugins {
    // Apply the java-library plugin for API and implementation separation.
    id 'java-library'
    id 'checkstyle'
    id 'maven-publish'
    id 'signing'
}

repositories {
    // Use Maven Central for resolving dependencies.
    mavenCentral()
    // Lombok edge releases
    maven {
        url 'https://projectlombok.org/edge-releases'
    }
}

sourceSets {
    integration {
        java {
            compileClasspath += main.output + test.output
            runtimeClasspath += main.output + test.output
            srcDir file('src/integration/java')
        }

        resources.srcDir file('/src/integration/resources')
    }
}

configurations {
    // integration tests
    // dependency inheritance
    integrationImplementation.extendsFrom testImplementation
    integrationRuntimeOnly.extendsFrom testRuntimeOnly
    integrationCompileOnly.extendsFrom testCompileOnly
    integrationAnnotationProcessor.extendsFrom testAnnotationProcessor
}

dependencies {
    // impl
    compileOnly 'org.projectlombok:lombok:edge-SNAPSHOT'
    annotationProcessor 'org.projectlombok:lombok:edge-SNAPSHOT'

    implementation 'com.fasterxml.jackson.core:jackson-databind:2.21.1'
    
    // unit tests
    testCompileOnly 'org.projectlombok:lombok:edge-SNAPSHOT'
    testAnnotationProcessor 'org.projectlombok:lombok:edge-SNAPSHOT'

    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
    testImplementation 'org.assertj:assertj-core:3.27.7'
    testImplementation 'org.awaitility:awaitility:4.2.2'
    testImplementation 'org.junit.jupiter:junit-jupiter:5.10.3'

    // integration tests
    integrationImplementation project(':testcontainer')
    integrationImplementation 'org.testcontainers:testcontainers-junit-jupiter:2.0.3'

}

// Apply a specific Java toolchain to ease working on different environments.
java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(25)
    }
}

compileJava {
    options.compilerArgs.addAll(['--release', '11'])
}

compileTestJava {
    options.compilerArgs.addAll(['--release', '11'])
}

test {
    // Use JUnit Platform for unit tests.
    useJUnitPlatform()
}

def toolchains = extensions.getByType(JavaToolchainService)

tasks.register('testJdk11', Test) {
    description = 'Runs unit tests on JDK 11'
    group = 'verification'
    testClassesDirs = sourceSets.test.output.classesDirs
    classpath = sourceSets.test.runtimeClasspath
    javaLauncher = toolchains.launcherFor {
        languageVersion = JavaLanguageVersion.of(11)
    }
    useJUnitPlatform()
    shouldRunAfter(tasks.named('test'))
}

tasks.register('integrationTest', Test) {
    description = 'Runs integration tests.'
    group = 'verification'
    testClassesDirs = sourceSets.integration.output.classesDirs
    classpath = sourceSets.integration.runtimeClasspath
    useJUnitPlatform()
    shouldRunAfter(tasks.named('test'))
}

checkstyle {
    toolVersion = "13.3.0"
    configFile = file("${rootDir}/config/checkstyle/checkstyle.xml")
    ignoreFailures = false
}

tasks.withType(Checkstyle) {
    reports {
        xml.required = true
        html.required = true
    }
}

publishing {
    publications {
        mavenJava(MavenPublication) {
            from components.java
            pom {
                name = 'rstmdb-client'
                description = 'Official Java client for rstmdb'
                url = 'https://github.com/rstmdb/rstmdb-java'
                licenses {
                    license {
                        name = 'MIT'
                        url = 'https://opensource.org/licenses/MIT'
                    }
                }
                scm {
                    url = 'https://github.com/rstmdb/rstmdb-java'
                }
            }
        }
    }

    repositories {
        maven {
            url = uri('https://s01.oss.sonatype.org/service/local/staging/deploy/maven2/')
            credentials {
                username = System.getenv('CENTRAL_USERNAME')
                password = System.getenv('CENTRAL_PASSWORD')
            }
        }
    }
}

signing {
    useInMemoryPgpKeys(System.getenv('SIGNING_KEY'), null)
    sign publishing.publications.mavenJava
}

tasks.withType(Sign) {
    onlyIf { System.getenv('SIGNING_KEY') != null }
}
