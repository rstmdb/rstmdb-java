name: CI
on:
  push:
    branches: [main, 'feature/**']
  pull_request:
    branches: [main, 'feature/**']

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest]
        java-version: ["25"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java-version }}
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew test

  integration-test:
    strategy:
      matrix:
        os: [ubuntu-latest]
        java-version: ["25"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java-version }}
      - uses: gradle/actions/setup-gradle@v4
      - name: Set up Docker (for Testcontainers)
        uses: docker/setup-buildx-action@v3
      - run: ./gradlew integrationTest

  test-jdk-11:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Java 11 (for testJdk11 toolchain)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"
      - name: Install Java 25 (for Gradle 9.x)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew testJdk11
